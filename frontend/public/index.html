<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub - 线上答疑互助平台</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus@2.5.6/dist/index.css">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus@2.5.6/dist/index.full.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script src="https://unpkg.com/axios@1.6.7/dist/axios.min.js"></script>
</head>
<body>
<div id="app" class="app-container">
  <header v-if="isLoggedIn" class="app-header">
    <div class="logo" @click="navigate('home')">
      <div class="logo-icon">S</div>
      <span>StudyHub</span>
    </div>
    <div class="nav-menu">
      <el-button text :class="{active: currentPage==='home'}" @click="navigate('home')"><el-icon><HomeFilled /></el-icon> 首页</el-button>
      <el-button text :class="{active: currentPage==='questions'}" @click="navigate('questions')"><el-icon><ChatDotRound /></el-icon> 问答</el-button>
      <el-button text :class="{active: currentPage==='resources'}" @click="navigate('resources')"><el-icon><Document /></el-icon> 资源</el-button>
      <el-button text :class="{active: currentPage==='admin'}" @click="navigate('admin')"><el-icon><Setting /></el-icon> 后台</el-button>
    </div>
    <div class="user-info">
      <span class="user-points">{{ currentUser.points }} 积分</span>
      <el-dropdown @command="handleUserCommand">
        <span style="cursor:pointer; display:flex; align-items:center; gap:8px;">
          <el-avatar :size="36" :src="currentUser.avatar" />
          <span>{{ currentUser.username }}</span>
          <el-icon><ArrowDown /></el-icon>
        </span>
        <template #dropdown>
          <el-dropdown-menu>
            <el-dropdown-item command="profile">个人中心</el-dropdown-item>
            <el-dropdown-item command="ask">我要提问</el-dropdown-item>
            <el-dropdown-item divided command="logout">退出登录</el-dropdown-item>
          </el-dropdown-menu>
        </template>
      </el-dropdown>
    </div>
  </header>

  <div v-if="!isLoggedIn" class="login-container">
    <transition name="fade">
      <div v-if="showLogin" class="login-box" key="login">
        <div class="login-title"><h2>StudyHub</h2><p>线上答疑互助平台 - 同学互助，共同进步</p></div>
        <el-form :model="loginForm" class="login-form" @keyup.enter="doLogin">
          <el-form-item><el-input v-model="loginForm.username" placeholder="用户名" size="large" :prefix-icon="User" /></el-form-item>
          <el-form-item><el-input v-model="loginForm.password" type="password" placeholder="密码" size="large" :prefix-icon="Lock" show-password /></el-form-item>
          <el-form-item><el-button type="danger" class="login-btn" size="large" @click="doLogin" :loading="loading">登 录</el-button></el-form-item>
        </el-form>
        <div style="text-align:center; margin-top:16px;"><el-button link type="primary" @click="showLogin=false">还没有账号？立即注册</el-button></div>
      </div>
      <div v-else class="login-box" key="register">
        <div class="login-title"><h2>注册账号</h2><p>加入 StudyHub，开始互助学习之旅</p></div>
        <el-form :model="regForm" class="login-form" @keyup.enter="doRegister">
          <el-form-item><el-input v-model="regForm.username" placeholder="用户名（3-20字符）" size="large" :prefix-icon="User" /></el-form-item>
          <el-form-item><el-input v-model="regForm.password" type="password" placeholder="密码（6-20字符）" size="large" :prefix-icon="Lock" show-password /></el-form-item>
          <el-form-item><el-input v-model="regForm.email" placeholder="邮箱（选填）" size="large" :prefix-icon="Message" /></el-form-item>
          <el-form-item><el-button type="danger" class="login-btn" size="large" @click="doRegister" :loading="loading">注 册</el-button></el-form-item>
        </el-form>
        <div style="text-align:center; margin-top:16px;"><el-button link type="primary" @click="showLogin=true">已有账号？去登录</el-button></div>
      </div>
    </transition>
  </div>

  <template v-else>
    <div v-if="currentPage==='home'" class="page-container">
      <div class="home-hero">
        <h1>欢迎回来，{{ currentUser.username }}！</h1>
        <p>在这里提出问题、分享知识、互助成长。今天你学到了什么？</p>
        <div class="hero-stats">
          <div class="hero-stat"><div class="num">{{ stats.userCount }}</div><div class="label">注册用户</div></div>
          <div class="hero-stat"><div class="num">{{ stats.questionCount }}</div><div class="label">问题总数</div></div>
          <div class="hero-stat"><div class="num">{{ stats.answerCount }}</div><div class="label">回答总数</div></div>
          <div class="hero-stat"><div class="num">{{ stats.resourceCount }}</div><div class="label">学习资源</div></div>
        </div>
      </div>
      <el-row :gutter="20">
        <el-col :span="16">
          <div class="section-title">热门问题</div>
          <div v-for="q in hotQuestions" :key="q.id" class="question-card" @click="viewQuestion(q.id)">
            <h3>{{ q.title }}</h3>
            <p class="desc">{{ q.content }}</p>
            <div class="card-meta">
              <span class="tag tag-category">{{ q.categoryName }}</span>
              <span class="tag" :class="q.status==='OPEN'?'tag-status-open':'tag-status-closed'">{{ q.status==='OPEN'?'待解决':'已解决' }}</span>
              <span class="tag tag-points" v-if="q.pointsReward">{{ q.pointsReward }} 积分</span>
              <span class="info">{{ q.answerCount }} 回答 · {{ q.viewCount }} 浏览 · {{ q.username }}</span>
            </div>
          </div>
          <div class="section-title" style="margin-top:24px;">最新问题</div>
          <div v-for="q in latestQuestions" :key="q.id" class="question-card" @click="viewQuestion(q.id)">
            <h3>{{ q.title }}</h3>
            <p class="desc">{{ q.content }}</p>
            <div class="card-meta">
              <span class="tag tag-category">{{ q.categoryName }}</span>
              <span class="tag" :class="q.status==='OPEN'?'tag-status-open':'tag-status-closed'">{{ q.status==='OPEN'?'待解决':'已解决' }}</span>
              <span class="tag tag-points" v-if="q.pointsReward">{{ q.pointsReward }} 积分</span>
              <span class="info">{{ q.answerCount }} 回答 · {{ q.viewCount }} 浏览 · {{ q.username }}</span>
            </div>
          </div>
        </el-col>
        <el-col :span="8">
          <div class="sidebar-card">
            <h4>快速操作</h4>
            <el-button type="danger" style="width:100%; margin-bottom:12px; border-radius:10px; height:44px;" @click="navigate('ask')"><el-icon><Plus /></el-icon> 我要提问</el-button>
            <el-button style="width:100%; border-radius:10px; height:44px;" @click="navigate('questions')"><el-icon><Search /></el-icon> 浏览全部问题</el-button>
          </div>
          <div class="sidebar-card">
            <h4>热门分类</h4>
            <div v-for="c in categories" :key="c.id" class="category-item" @click="filterByCategory(c.id)">
              <div><div class="cat-name">{{ c.name }}</div><div class="cat-desc">{{ c.description }}</div></div>
              <el-icon><ArrowRight /></el-icon>
            </div>
          </div>
        </el-col>
      </el-row>
    </div>

    <div v-if="currentPage==='questions'" class="page-container">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div class="section-title" style="margin:0;">全部问题</div>
        <div style="display:flex; gap:12px;">
          <el-input v-model="searchKeyword" placeholder="搜索问题..." style="width:280px;" clearable @keyup.enter="searchQuestions"><template #append><el-button @click="searchQuestions"><el-icon><Search /></el-icon></el-button></template></el-input>
          <el-select v-model="filterStatus" placeholder="状态" style="width:120px;" clearable @change="searchQuestions"><el-option label="全部" value="" /><el-option label="待解决" value="OPEN" /><el-option label="已解决" value="CLOSED" /></el-select>
          <el-button type="danger" @click="navigate('ask')"><el-icon><Plus /></el-icon> 提问</el-button>
        </div>
      </div>
      <div v-for="q in questionList" :key="q.id" class="question-card" @click="viewQuestion(q.id)">
        <h3>{{ q.title }}</h3>
        <p class="desc">{{ q.content }}</p>
        <div class="card-meta">
          <span class="tag tag-category">{{ q.categoryName }}</span>
          <span class="tag" :class="q.status==='OPEN'?'tag-status-open':'tag-status-closed'">{{ q.status==='OPEN'?'待解决':'已解决' }}</span>
          <span class="tag tag-points" v-if="q.pointsReward">{{ q.pointsReward }} 积分</span>
          <span class="info">{{ q.answerCount }} 回答 · {{ q.viewCount }} 浏览 · {{ formatDate(q.createdAt) }}</span>
        </div>
      </div>
      <div v-if="questionList.length === 0" class="empty-state"><el-icon><DocumentDelete /></el-icon><p>暂无问题</p></div>
    </div>

    <div v-if="currentPage==='detail' && currentQuestion" class="page-container">
      <el-button link @click="navigate('questions')" style="margin-bottom:16px;"><el-icon><ArrowLeft /></el-icon> 返回列表</el-button>
      <div class="detail-header">
        <h1>{{ currentQuestion.title }}</h1>
        <div class="detail-content">{{ currentQuestion.content }}</div>
        <div class="card-meta">
          <span class="tag tag-category">{{ currentQuestion.categoryName }}</span>
          <span class="tag" :class="currentQuestion.status==='OPEN'?'tag-status-open':'tag-status-closed'">{{ currentQuestion.status==='OPEN'?'待解决':'已解决' }}</span>
          <span class="tag tag-points" v-if="currentQuestion.pointsReward">{{ currentQuestion.pointsReward }} 积分</span>
          <span class="info"><el-avatar :size="20" :src="currentQuestion.userAvatar" /> {{ currentQuestion.username }} · {{ formatDate(currentQuestion.createdAt) }}</span>
        </div>
      </div>
      <div class="section-title">回答 ({{ answers.length }})</div>
      <div v-for="a in answers" :key="a.id" class="answer-card" :class="{accepted: a.isAccepted}">
        <div class="answer-header">
          <el-avatar :size="32" :src="a.userAvatar" />
          <span class="answer-author">{{ a.username }}</span>
          <span class="answer-time">{{ formatDate(a.createdAt) }}</span>
          <span v-if="a.isAccepted" class="accept-badge">已采纳</span>
          <el-button v-else-if="currentQuestion.status==='OPEN' && currentQuestion.userId===currentUser.id" size="small" type="success" @click="acceptAnswer(a.id)">采纳</el-button>
        </div>
        <div class="answer-content">{{ a.content }}</div>
      </div>
      <div v-if="answers.length===0" class="empty-state"><el-icon><ChatLineRound /></el-icon><p>暂无回答，来做第一个回答者吧！</p></div>
      <div v-if="currentQuestion.status==='OPEN'" class="answer-card" style="margin-top:20px;">
        <div class="section-title" style="margin-bottom:16px;">撰写回答</div>
        <el-input v-model="answerContent" type="textarea" :rows="5" placeholder="分享你的知识和经验..." />
        <el-button type="danger" style="margin-top:12px; border-radius:10px;" @click="submitAnswer" :loading="submitting">提交回答</el-button>
      </div>
    </div>

    <div v-if="currentPage==='ask'" class="page-container">
      <div class="ask-form-card">
        <div class="section-title" style="margin-bottom:24px;">发布问题</div>
        <el-form :model="askForm" label-width="80px">
          <el-form-item label="问题标题"><el-input v-model="askForm.title" placeholder="用一句话简明描述你的问题" maxlength="200" show-word-limit /></el-form-item>
          <el-form-item label="问题分类"><el-select v-model="askForm.categoryId" placeholder="选择分类" style="width:100%"><el-option v-for="c in categories" :key="c.id" :label="c.name" :value="c.id" /></el-select></el-form-item>
          <el-form-item label="悬赏积分"><el-slider v-model="askForm.pointsReward" :max="currentUser.points" show-stops :step="5" /><div style="color:#888; font-size:13px;">当前可用积分: {{ currentUser.points }}</div></el-form-item>
          <el-form-item label="问题描述"><el-input v-model="askForm.content" type="textarea" :rows="10" placeholder="详细描述你的问题，包括背景、尝试过的方案、报错信息等..." /></el-form-item>
          <el-form-item>
            <el-button type="danger" style="border-radius:10px; height:44px; padding:0 32px;" @click="doAsk" :loading="submitting">发布问题</el-button>
            <el-button style="border-radius:10px; height:44px;" @click="navigate('questions')">取消</el-button>
          </el-form-item>
        </el-form>
      </div>
    </div>

    <div v-if="currentPage==='resources'" class="page-container">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div class="section-title" style="margin:0;">学习资源</div>
        <el-input v-model="resourceKeyword" placeholder="搜索资源..." style="width:280px;" clearable @keyup.enter="loadResources"><template #append><el-button @click="loadResources"><el-icon><Search /></el-icon></el-button></template></el-input>
      </div>
      <div class="resource-grid">
        <div v-for="r in resources" :key="r.id" class="resource-card">
          <div class="res-icon"><el-icon><DocumentChecked /></el-icon></div>
          <h4>{{ r.title }}</h4>
          <p class="res-desc">{{ r.description }}</p>
          <div class="card-meta"><span class="tag tag-category">{{ r.category }}</span><span class="tag tag-points">{{ r.pointsCost }} 积分</span></div>
          <div class="res-meta" style="margin-top:12px;"><span><el-icon><Download /></el-icon> {{ r.downloadCount }}次下载</span><span>{{ r.username }}</span></div>
        </div>
      </div>
      <div v-if="resources.length===0" class="empty-state"><el-icon><FolderOpened /></el-icon><p>暂无资源</p></div>
    </div>

    <div v-if="currentPage==='profile'" class="page-container">
      <div class="profile-header">
        <el-avatar :size="100" :src="currentUser.avatar" class="profile-avatar" />
        <div class="profile-name">{{ currentUser.username }}</div>
        <div class="profile-email">{{ currentUser.email || '未设置邮箱' }}</div>
        <el-button type="danger" round @click="editProfileVisible=true">编辑资料</el-button>
        <div class="profile-stats">
          <div class="profile-stat"><div class="num">{{ currentUser.points }}</div><div class="label">积分</div></div>
          <div class="profile-stat"><div class="num">{{ myQuestions.length }}</div><div class="label">提问</div></div>
          <div class="profile-stat"><div class="num">{{ myAnswers.length }}</div><div class="label">回答</div></div>
        </div>
      </div>
      <el-tabs type="border-card">
        <el-tab-pane label="我的提问">
          <div v-for="q in myQuestions" :key="q.id" class="question-card" @click="viewQuestion(q.id)">
            <h3>{{ q.title }}</h3>
            <div class="card-meta"><span class="tag" :class="q.status==='OPEN'?'tag-status-open':'tag-status-closed'">{{ q.status==='OPEN'?'待解决':'已解决' }}</span><span class="info">{{ q.answerCount }} 回答 · {{ formatDate(q.createdAt) }}</span></div>
          </div>
          <div v-if="myQuestions.length===0" class="empty-state"><p>还没有提问</p></div>
        </el-tab-pane>
        <el-tab-pane label="我的回答">
          <div v-for="a in myAnswers" :key="a.id" class="answer-card"><div class="answer-content">{{ a.content }}</div><div class="info" style="margin-top:8px;">{{ formatDate(a.createdAt) }}</div></div>
          <div v-if="myAnswers.length===0" class="empty-state"><p>还没有回答</p></div>
        </el-tab-pane>
      </el-tabs>
      <el-dialog v-model="editProfileVisible" title="编辑资料" width="450px">
        <el-form :model="editForm" label-width="80px">
          <el-form-item label="用户名"><el-input v-model="editForm.username" disabled /></el-form-item>
          <el-form-item label="邮箱"><el-input v-model="editForm.email" /></el-form-item>
          <el-form-item label="头像URL"><el-input v-model="editForm.avatar" /></el-form-item>
        </el-form>
        <template #footer><el-button @click="editProfileVisible=false">取消</el-button><el-button type="danger" @click="saveProfile">保存</el-button></template>
      </el-dialog>
    </div>

    <div v-if="currentPage==='admin'" class="page-container">
      <div class="section-title">仪表盘</div>
      <div class="dashboard-grid">
        <div class="dashboard-card"><el-icon class="dash-icon dash-icon-users"><UserFilled /></el-icon><div class="dash-num">{{ stats.userCount }}</div><div class="dash-label">注册用户</div></div>
        <div class="dashboard-card"><el-icon class="dash-icon dash-icon-questions"><ChatDotRound /></el-icon><div class="dash-num">{{ stats.questionCount }}</div><div class="dash-label">问题总数</div></div>
        <div class="dashboard-card"><el-icon class="dash-icon dash-icon-answers"><CircleCheck /></el-icon><div class="dash-num">{{ stats.answerCount }}</div><div class="dash-label">回答总数</div></div>
        <div class="dashboard-card"><el-icon class="dash-icon dash-icon-resources"><Document /></el-icon><div class="dash-num">{{ stats.resourceCount }}</div><div class="dash-label">资源数量</div></div>
      </div>
      <div class="section-title" style="margin-top:24px;">问题管理</div>
      <el-table :data="allQuestions" style="width:100%; background:white; border-radius:12px;" border>
        <el-table-column prop="id" label="ID" width="60" />
        <el-table-column prop="title" label="标题" min-width="200" show-overflow-tooltip />
        <el-table-column prop="categoryName" label="分类" width="100" />
        <el-table-column prop="status" label="状态" width="90"><template #default="scope"><el-tag :type="scope.row.status==='OPEN'?'success':'danger'">{{ scope.row.status==='OPEN'?'待解决':'已解决' }}</el-tag></template></el-table-column>
        <el-table-column prop="answerCount" label="回答" width="70" />
        <el-table-column prop="viewCount" label="浏览" width="70" />
        <el-table-column prop="username" label="作者" width="100" />
        <el-table-column label="操作" width="120"><template #default="scope"><el-button link type="danger" size="small" @click="deleteQuestion(scope.row.id)">删除</el-button></template></el-table-column>
      </el-table>
    </div>

    <footer class="app-footer"><p>StudyHub - 厦门大学软件工程课程项目 · 2025</p></footer>
  </template>
</div>
<script src="app.js"></script>
</body>
</html>
