server:
  port: 8080

spring:
  application:
    name: studyhub
  datasource:
    url: jdbc:mysql://localhost:3306/studyhub?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.studyhub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: StudyHubSecretKey2025ForJavaCourseProjectAtLeast256Bits!!
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
