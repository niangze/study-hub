# H2 In-Memory Database Profile
# Usage: Add "spring.profiles.active=h2" to application.yml
#        OR pass --spring.profiles.active=h2 as JVM argument
#        OR use IDEA Run Configuration with Active profiles: h2
#
# This profile requires NO MySQL installation.
# Tables and sample data are auto-created on startup via DataInitializer.

server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:studyhub;DB_CLOSE_DELAY=-1;MODE=MYSQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER,PASSWORD,ROLE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.studyhub.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: studyhub-jwt-secret-key-2024-xmu-software-engineering
  expiration: 86400000

logging:
  level:
    com.studyhub: DEBUG
    com.studyhub.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
